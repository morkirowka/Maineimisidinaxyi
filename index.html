<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сюрприз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        .btn {
            cursor: pointer;
            z-index: 10;
            transition: 0.3s;
        }
        .btn img {
            width: 280px;
            border-radius: 30px;
            box-shadow: 0 0 30px #ff00ff;
        }
        .btn:hover {
            transform: scale(1.1);
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .overlay video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .flash {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            z-index: 50;
            pointer-events: none;
            animation: flashAnim 0.1s infinite;
        }
        @keyframes flashAnim {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }

        @media (max-width: 600px) {
            .btn img { width: 200px; }
        }
    </style>
</head>
<body>

    <!-- КНОПКА -->
    <div class="btn" id="clickBtn">
        <img src="https://via.placeholder.com/300x150/222/fff?text=НАЖМИ+СЮДА" alt="Нажми сюда">
    </div>

    <!-- ВИДЕО (ЛЮБОЕ) -->
    <div class="overlay" id="videoOverlay">
        <video id="myVideo" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <!-- МИГАНИЕ ЭКРАНА -->
    <div class="flash" id="flashLayer"></div>

    <script>
        const btn = document.getElementById('clickBtn');
        const videoOverlay = document.getElementById('videoOverlay');
        const myVideo = document.getElementById('myVideo');
        const flashLayer = document.getElementById('flashLayer');

        btn.addEventListener('click', function() {

            // Прячем кнопку
            btn.style.display = 'none';

            // Мигание экрана 3 секунды
            flashLayer.style.display = 'block';

            // Через 3 секунды — видео
            setTimeout(() => {
                flashLayer.style.display = 'none';
                videoOverlay.style.display = 'flex';
                myVideo.muted = false;
                myVideo.play();
            }, 3000);

        });
    </script>

</body>
</html>
