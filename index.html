<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Скачать</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            position: relative;
        }

        /* ── ГРУСТНЫЙ СМАЙЛИК (фон) ── */
        .sad-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            opacity: 0.06;
            pointer-events: none;
            transition: all 0.5s ease;
            user-select: none;
            z-index: 0;
        }

        /* ── ВЕСЁЛЫЙ СМАЙЛИК (появляется при наведении) ── */
        .happy-emoji {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 200px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            z-index: 0;
        }

        /* ── КОГДА НАВЕЛИ НА КНОПКУ ── */
        body.happy .sad-emoji {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
        }

        body.happy .happy-emoji {
            opacity: 0.08;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ── КНОПКА ── */
        .download-btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background: #000000;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #1a1a1a, #333333, #1a1a1a);
            background-size: 400% 400%;
            border-radius: 14px;
            z-index: -1;
            animation: glow 6s ease infinite;
            opacity: 0.3;
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .download-btn:hover {
            border-color: #444444;
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        .download-btn:active {
            transform: scale(0.95);
            border-color: #666666;
        }

        /* ── ИНФО ── */
        .device-info {
            color: #444;
            font-size: 12px;
            margin-top: 15px;
            letter-spacing: 0.5px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .device-info span {
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #aaa;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #2a2a2a;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── ТЕКСТ ПОД КНОПКОЙ (эмоция) ── */
        .mood-text {
            color: #555;
            font-size: 14px;
            margin-top: 10px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            letter-spacing: 0.5px;
        }

        body.happy .mood-text {
            color: #888;
        }
    </style>
</head>
<body>

    <!-- ГРУСТНЫЙ СМАЙЛИК -->
    <div class="sad-emoji">:(</div>

    <!-- ВЕСЁЛЫЙ СМАЙЛИК -->
    <div class="happy-emoji">:)</div>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <button class="download-btn" id="downloadBtn">СКАЧАТЬ</button>

        <div class="mood-text" id="moodText">:( Грустно...</div>

        <div class="device-info">
            📱 <span id="deviceType">Определение...</span>
        </div>
    </div>

    <div class="toast" id="toast">Загрузка...</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const downloadBtn = document.getElementById('downloadBtn');
            const toast = document.getElementById('toast');
            const deviceType = document.getElementById('deviceType');
            const moodText = document.getElementById('moodText');

            // ── ОПРЕДЕЛЕНИЕ УСТРОЙСТВА ──
            function getDeviceType() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                const isMobile = /android|iphone|ipad|ipod|blackberry|windows phone|webos|iemobile|opera mini/i.test(ua);
                const isAndroid = /android/i.test(ua);
                const isIOS = /iphone|ipad|ipod/i.test(ua);

                if (isAndroid || isIOS) {
                    return 'phone';
                }
                return 'desktop';
            }

            const device = getDeviceType();
            deviceType.textContent = device === 'phone' ? 'Телефон (APK) 📱' : 'Компьютер (ZIP) 💻';

            // ── СМЕНА НАСТРОЕНИЯ ──
            downloadBtn.addEventListener('mouseenter', function() {
                document.body.classList.add('happy');
                moodText.textContent = ':) Радостно!';
            });

            downloadBtn.addEventListener('mouseleave', function() {
                document.body.classList.remove('happy');
                moodText.textContent = ':( Грустно...';
            });

            // ── ДЛЯ ТАЧ-ЭКРАНОВ (телефоны) ──
            downloadBtn.addEventListener('touchstart', function() {
                document.body.classList.add('happy');
                moodText.textContent = ':) Радостно!';
            });

            downloadBtn.addEventListener('touchend', function() {
                setTimeout(() => {
                    document.body.classList.remove('happy');
                    moodText.textContent = ':( Грустно...';
                }, 500);
            });

            // ── УВЕДОМЛЕНИЕ ──
            function showToast() {
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            // ── СКАЧИВАНИЕ ──
            function downloadFile() {
                const device = getDeviceType();

                // ═══════════════════════════════════════
                // 🔽 СЮДА ВСТАВЬ СВОИ ССЫЛКИ 🔽
                // ═══════════════════════════════════════

                let url;
                let fileName;

                if (device === 'phone') {
                    url = 'https://example.com/app.apk';  // ← ССЫЛКА НА APK
                    fileName = 'app.apk';
                } else {
                    url = 'https://example.com/app.zip';   // ← ССЫЛКА НА ZIP
                    fileName = 'app.zip';
                }

                // ═══════════════════════════════════════

                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                link.target = '_blank';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast();
            }

            downloadBtn.addEventListener('click', downloadFile);

        });
    </script>

</body>
</html>
