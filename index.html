<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Сюрприз</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .btn {
            background: #e94560;
            color: white;
            font-size: 40px;
            font-weight: bold;
            padding: 30px 60px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 30px #e94560;
            transition: 0.3s;
            z-index: 10;
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .flash {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: red;
            z-index: 50;
            animation: flashAnim 0.1s infinite;
        }
        @keyframes flashAnim {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        .video-box {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .video-box video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @media (max-width: 600px) {
            .btn { font-size: 24px; padding: 20px 30px; }
        }
    </style>
</head>
<body>

    <button class="btn" id="clickBtn">👉 НАЖМИ СЮДА 👈</button>

    <div class="flash" id="flashLayer"></div>

    <div class="video-box" id="videoOverlay">
        <video id="myVideo" muted playsinline>
            <source src="video.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        const btn = document.getElementById('clickBtn');
        const flash = document.getElementById('flashLayer');
        const videoBox = document.getElementById('videoOverlay');
        const myVideo = document.getElementById('myVideo');

        btn.addEventListener('click', function() {
            btn.style.display = 'none';
            flash.style.display = 'block';

            setTimeout(() => {
                flash.style.display = 'none';
                videoBox.style.display = 'flex';
                myVideo.muted = false;
                myVideo.play();
            }, 3000);
        });
    </script>

</body>
</html>
