<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Скачать приложение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .download-btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background: #000000;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #1a1a1a, #333333, #1a1a1a);
            background-size: 400% 400%;
            border-radius: 14px;
            z-index: -1;
            animation: glow 6s ease infinite;
            opacity: 0.3;
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .download-btn:hover {
            border-color: #444444;
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        .download-btn:active {
            transform: scale(0.95);
            border-color: #666666;
        }

        .device-info {
            color: #444;
            font-size: 12px;
            margin-top: 15px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .device-info span {
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #aaa;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #2a2a2a;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div style="display: flex; flex-direction: column; align-items: center;">
        <button class="download-btn" id="downloadBtn">СКАЧАТЬ</button>
        <div class="device-info">
            📱 <span id="deviceType">Определение...</span>
        </div>
    </div>

    <div class="toast" id="toast">Загрузка...</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const downloadBtn = document.getElementById('downloadBtn');
            const toast = document.getElementById('toast');
            const deviceType = document.getElementById('deviceType');

            // ── ОПРЕДЕЛЕНИЕ УСТРОЙСТВА ──
            function getDeviceType() {
                const ua = navigator.userAgent || navigator.vendor || window.opera;
                const isMobile = /android|iphone|ipad|ipod|blackberry|windows phone|webos|iemobile|opera mini/i.test(ua);
                const isAndroid = /android/i.test(ua);
                const isIOS = /iphone|ipad|ipod/i.test(ua);

                if (isAndroid || isIOS) {
                    return 'phone';
                }
                return 'desktop';
            }

            const device = getDeviceType();
            deviceType.textContent = device === 'phone' ? 'Телефон (APK) 📱' : 'Компьютер (ZIP) 💻';

            function showToast() {
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            // ── СКАЧИВАНИЕ ──
            function downloadFile() {
                const device = getDeviceType();

                let url;
                let fileName;

                if (device === 'phone') {
                    // ═══════════════════════════════════════
                    // 🔽 СЮДА ВСТАВЬ ССЫЛКУ НА APK 🔽
                    // ═══════════════════════════════════════
                    url = 'https://example.com/app.apk';  // ← ЗАМЕНИ НА СВОЮ ССЫЛКУ
                    fileName = 'app.apk';
                } else {
                    // ═══════════════════════════════════════
                    // 🔽 СЮДА ВСТАВЬ ССЫЛКУ НА ZIP 🔽
                    // ═══════════════════════════════════════
                    url = 'https://example.com/app.zip';   // ← ЗАМЕНИ НА СВОЮ ССЫЛКУ
                    fileName = 'app.zip';
                }

                // Скачиваем через создание ссылки
                const link = document.createElement('a');
                link.href = url;
                link.download = fileName;
                link.target = '_blank';

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                showToast();
            }

            downloadBtn.addEventListener('click', downloadFile);

        });
    </script>

</body>
</html>
