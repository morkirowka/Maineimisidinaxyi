<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Открыть ссылку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .emoji {
            font-size: 180px;
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            user-select: none;
            pointer-events: none;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.05);
        }

        .open-btn {
            display: inline-block;
            padding: 18px 60px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            background: #000000;
            border: 2px solid #2a2a2a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            position: relative;
            overflow: hidden;
            border: none;
        }

        .open-btn::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #1a1a1a, #333333, #1a1a1a);
            background-size: 400% 400%;
            border-radius: 14px;
            z-index: -1;
            animation: glow 6s ease infinite;
            opacity: 0.3;
        }

        @keyframes glow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .open-btn:hover {
            border: 2px solid #444444;
            transform: scale(1.03);
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        .open-btn:active {
            transform: scale(0.95);
            border: 2px solid #666666;
        }

        .device-info {
            color: #444;
            font-size: 12px;
            letter-spacing: 0.5px;
            text-align: center;
            margin-top: 10px;
        }

        .device-info span {
            color: #666;
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1a1a1a;
            color: #aaa;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 14px;
            border: 1px solid #2a2a2a;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji" id="emoji">:(</div>
        <button class="open-btn" id="openBtn">ОТКРЫТЬ ССЫЛКУ</button>
        <div class="device-info">
            📱 <span id="linkCounter">Готово...</span>
        </div>
    </div>

    <div class="toast" id="toast">Открываю...</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const openBtn = document.getElementById('openBtn');
            const emoji = document.getElementById('emoji');
            const toast = document.getElementById('toast');
            const linkCounter = document.getElementById('linkCounter');

            // ═══════════════════════════════════════════
            // 🔽 СЮДА ВСТАВЛЯЙ СВОИ 10 ССЫЛОК 🔽
            // ═══════════════════════════════════════════

            const links = ['https://ru.pinterest.com/pin/1142999580451470079/
                           'https://ru.pinterest.com/pin/1114078026583138568#imgViewer
                           'https://ru.pinterest.com/pin/929360073122487123#imgViewer
                           'https://ru.pinterest.com/pin/1130122100265266407/
                           'https://ru.pinterest.com/pin/1110841064356050070#imgViewer
                           'https://ru.pinterest.com/pin/101401429104743458#imgViewer
                           'https://ru.pinterest.com/pin/981855156274575358#imgViewer
                           'https://ru.pinterest.com/pin/997125173738574749#imgViewer
                           'https://ru.pinterest.com/pin/1014787728546426594#imgViewer];

            // ═══════════════════════════════════════════

            let previousIndex = -1;

            // ── ФУНКЦИЯ СЛУЧАЙНОЙ С
            СЫЛКИ ──
            function getRandomLink() {
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * links.length);
                } while (randomIndex === previousIndex && links.length > 1);
                previousIndex = randomIndex;
                return links[randomIndex];
            }

            // ── ПОКАЗАТЬ УВЕДОМЛЕНИЕ ──
            function showToast(message = 'Открываю...') {
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(window.toastTimer);
                window.toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ── ОТКРЫТЬ СЛУЧАЙНУЮ ССЫЛКУ ──
            function openRandomLink() {
                const url = getRandomLink();
                const linkNumber = previousIndex + 1;

                // Показываем номер ссылки
                linkCounter.textContent = `Ссылка #${linkNumber} из ${links.length}`;

                // Открываем в новой вкладке
                window.open(url, '_blank');

                showToast(`✅ Ссылка #${linkNumber} открыта!`);
            }

            // ── СМЕНА СМАЙЛИКА ──
            openBtn.addEventListener('mouseenter', function() {
                emoji.textContent = ':)';
                emoji.style.transform = 'scale(1.1)';
                emoji.style.textShadow = '0 0 80px rgba(255,255,255,0.15)';
            });

            openBtn.addEventListener('mouseleave', function() {
                emoji.textContent = ':(';
                emoji.style.transform = 'scale(1)';
                emoji.style.textShadow = '0 0 60px rgba(255,255,255,0.05)';
            });

            // ── ДЛЯ ТЕЛЕФОНОВ ──
            openBtn.addEventListener('touchstart', function() {
                emoji.textContent = ':)';
                emoji.style.transform = 'scale(1.1)';
                emoji.style.textShadow = '0 0 80px rgba(255,255,255,0.15)';
            });

            openBtn.addEventListener('touchend', function() {
                setTimeout(() => {
                    emoji.textContent = ':(';
                    emoji.style.transform = 'scale(1)';
                    emoji.style.textShadow = '0 0 60px rgba(255,255,255,0.05)';
                }, 300);
            });

            // ── НАЖАТИЕ НА КНОПКУ ──
            openBtn.addEventListener('click', openRandomLink);

            // ── ПЕРВОНАЧАЛЬНЫЙ СТАТУС ──
            linkCounter.textContent = `${links.length} ссылок готово`;

        });
    </script>

</body>
</html>
