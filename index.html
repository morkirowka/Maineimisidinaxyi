<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Моё портфолио</title>
    <style>
        /* ── Общие стили ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            max-width: 700px;
            width: 100%;
            background: #161b22;
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
            border: 1px solid #30363d;
            transition: 0.3s;
        }

        .card:hover {
            border-color: #58a6ff;
        }

        /* ── Аватар ── */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #1f6feb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 20px;
            user-select: none;
            box-shadow: 0 0 0 3px #0d1117, 0 0 0 5px #58a6ff;
        }

        /* ── Текст ── */
        h1 {
            font-size: 28px;
            text-align: center;
            font-weight: 600;
            color: #f0f6fc;
        }

        .subtitle {
            text-align: center;
            color: #8b949e;
            font-size: 18px;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        .bio {
            text-align: center;
            color: #b1bac4;
            font-size: 16px;
            margin-bottom: 28px;
            padding: 0 10px;
        }

        /* ── Ссылки-кнопки ── */
        .links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: 0.25s;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }

        .links a:hover {
            background: #30363d;
            border-color: #58a6ff;
            transform: scale(1.04);
            color: #fff;
        }

        .links a.github {
            background: #1f6feb;
            border-color: #1f6feb;
            color: #fff;
        }

        .links a.github:hover {
            background: #388bfd;
            border-color: #58a6ff;
        }

        /* ── Навыки ── */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .skills span {
            background: #21262d;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid #30363d;
            color: #b1bac4;
        }

        .skills span:hover {
            border-color: #58a6ff;
            color: #f0f6fc;
        }

        /* ── Адаптив ── */
        @media (max-width: 500px) {
            .card {
                padding: 28px 18px;
            }
            .avatar {
                width: 90px;
                height: 90px;
                font-size: 36px;
            }
            h1 {
                font-size: 22px;
            }
            .links a {
                padding: 8px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- Аватар (буквы инициалов) -->
        <div class="avatar">JD</div>

        <h1>Джон Доу</h1>
        <p class="subtitle">👨‍💻 Веб-разработчик</p>

        <p class="bio">
            Создаю удобные и современные сайты. 
            Люблю минимализм, чистый код и отзывчивые интерфейсы.
        </p>

        <!-- Социальные ссылки -->
        <div class="links">
            <a href="#" class="github">🐙 GitHub</a>
            <a href="#">📧 Email</a>
            <a href="#">💼 LinkedIn</a>
            <a href="#">🐦 Twitter</a>
        </div>

        <!-- Навыки -->
        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
            <span>React</span>
            <span>Git</span>
        </div>

    </div>

</body>
</html>
